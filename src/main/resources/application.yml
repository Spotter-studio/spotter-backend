spring:
  application:
    name: spotter-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spotter}
    username: ${SPRING_DATASOURCE_USERNAME:spotter}
    password: ${SPRING_DATASOURCE_PASSWORD:spotter}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    schemas: public
    default-schema: public
    create-schemas: false

server:
  port: ${SERVER_PORT:8080}

spotter:
  jwt:
    secret: ${SPOTTER_JWT_SECRET}
    expires-in-seconds: ${SPOTTER_JWT_EXPIRES_IN_SECONDS:3600}
